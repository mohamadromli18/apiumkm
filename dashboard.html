<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Penjualan</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="container">
        <div class="login-box">
            <h2>📊 Dashboard Admin</h2>
            <div class="login-error" id="loginError">Password salah!</div>
            <input type="password" id="passwordInput" placeholder="Masukkan password admin" onkeydown="if(event.key==='Enter') login()">
            <button class="btn btn-primary" onclick="login()">Masuk</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" style="display:none;">
        <div class="container">
            <div class="header">
                <h1>📊 Dashboard Penjualan</h1>
                <div class="header-actions">
                    <a href="/admin.html" class="btn btn-secondary">Manajemen Menu</a>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="number" id="totalOrders">-</div>
                    <div class="label">Total Pesanan</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="todayOrders">-</div>
                    <div class="label">Hari Ini</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="todayRevenue">-</div>
                    <div class="label">Pendapatan Hari Ini</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="topMenu">-</div>
                    <div class="label">Menu Terlaris</div>
                </div>
            </div>

            <div class="table-wrapper">
                <div class="table-header">
                    <h2>📋 Riwayat Pesanan</h2>
                </div>
                <div id="tableContainer">
                    <div class="loading">Memuat data...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
