<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Penjualan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 16px 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .header h1 { font-size: 24px; }
        .header-actions { display: flex; gap: 12px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #25D366; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #bdbdbd; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #25D366;
        }
        .stat-card .label {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        
        .table-wrapper {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .table-header {
            padding: 16px 24px;
            border-bottom: 1px solid #eee;
        }
        .table-header h2 { font-size: 18px; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            border-bottom: 2px solid #eee;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        tr:hover { background: #fafafa; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.baru { background: #e3f2fd; color: #1565c0; }
        .status-badge.diproses { background: #fff3e0; color: #e65100; }
        .status-badge.selesai { background: #e8f5e9; color: #2e7d32; }
        
        .loading { text-align: center; padding: 40px; color: #999; }
        .empty-state { text-align: center; padding: 60px; color: #999; }
        .empty-state p { font-size: 48px; margin-bottom: 12px; }
        
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .login-box h2 { text-align: center; margin-bottom: 24px; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .login-box .btn { width: 100%; padding: 14px; }
        .login-error {
            color: #e53935;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="container">
        <div class="login-box">
            <h2>📊 Dashboard Admin</h2>
            <div class="login-error" id="loginError">Password salah!</div>
            <input type="password" id="passwordInput" placeholder="Masukkan password admin" onkeydown="if(event.key==='Enter') login()">
            <button class="btn btn-primary" onclick="login()">Masuk</button>
        </div>
    </div>
    
    <!-- MAIN CONTENT -->
    <div id="mainContent" style="display:none;">
        <div class="container">
            <div class="header">
                <h1>📊 Dashboard Penjualan</h1>
                <div class="header-actions">
                    <a href="/admin.html" class="btn btn-secondary">Manajemen Menu</a>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="number" id="totalOrders">-</div>
                    <div class="label">Total Pesanan</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="todayOrders">-</div>
                    <div class="label">Hari Ini</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="todayRevenue">-</div>
                    <div class="label">Pendapatan Hari Ini</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="topMenu">-</div>
                    <div class="label">Menu Terlaris</div>
                </div>
            </div>
            
            <div class="table-wrapper">
                <div class="table-header">
                    <h2>📋 Riwayat Pesanan</h2>
                </div>
                <div id="tableContainer">
                    <div class="loading">Memuat data...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ============ KONFIGURASI ============
        const CONFIG = {
            API_URL: 'https://script.google.com/macros/s/AKfycbx_5XaWeKR3BRTGwJkmcSSnkNzeJ06T8uSQbK1b77W1TrhbqhuvvKowhRnAYvipEzW4/exec',
            ADMIN_PASSWORD: 'admin123'
        };
        
        let isLoggedIn = false;
        
        // ============ AUTHENTICATION ============
        function login() {
            const password = document.getElementById('passwordInput').value;
            const errorEl = document.getElementById('loginError');
            if (password === CONFIG.ADMIN_PASSWORD) {
                isLoggedIn = true;
                errorEl.style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                fetchDashboard();
            } else {
                errorEl.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }
        
        function logout() {
            isLoggedIn = false;
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').style.display = 'none';
        }
        
        // ============ FETCH DASHBOARD DATA ============
        async function fetchDashboard() {
            try {
                const response = await fetch(CONFIG.API_URL + '?action=dashboard');
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                renderStats(data);
                renderOrders(data.orders || []);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('statsGrid').innerHTML = '<div class="stat-card"><p>Gagal memuat data</p></div>';
                document.getElementById('tableContainer').innerHTML = 
                    '<div class="empty-state"><p>❌</p><p>Gagal memuat data</p></div>';
            }
        }
        
        // ============ RENDER STATISTIK ============
        function renderStats(data) {
            document.getElementById('totalOrders').textContent = data.totalOrders || 0;
            document.getElementById('todayOrders').textContent = data.todayOrders || 0;
            document.getElementById('todayRevenue').textContent = 'Rp ' + (data.todayRevenue || 0).toLocaleString('id-ID');
            document.getElementById('topMenu').textContent = data.topMenu || '-';
        }
        
        // ============ RENDER TABEL PESANAN ============
        function renderOrders(orders) {
            const container = document.getElementById('tableContainer');
            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📭</p><p>Belum ada pesanan</p></div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Metode</th>
                            <th>Meja</th>
                            <th>Menu</th>
                            <th>Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            orders.forEach(order => {
                const statusClass = order.status === 'Baru' ? 'baru' : 
                                   order.status === 'Diproses' ? 'diproses' : 'selesai';
                html += `
                    <tr>
                        <td>${order.waktu}</td>
                        <td>${order.metode}</td>
                        <td>${order.meja || '-'}</td>
                        <td>${order.nama_item}</td>
                        <td>Rp ${(order.total_harga || 0).toLocaleString('id-ID')}</td>
                        <td><span class="status-badge ${statusClass}">${order.status || 'Baru'}</span></td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }
        
        // ============ LOAD ============
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('passwordInput').focus();
        
        // Refresh dashboard setiap 60 detik
        setInterval(() => {
            if (isLoggedIn) fetchDashboard();
        }, 60000);
    </script>
</body>
</html>
