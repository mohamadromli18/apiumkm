<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Menu Digital | Aghnia Restaurant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f7f7f7;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
        }
        
        .header p {
            color: #666;
            margin-top: 5px;
        }
        
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
            scrollbar-width: thin;
        }
        
        .category-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .category-btn.active {
            background: #25D366;
            border-color: #25D366;
            color: white;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .menu-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .menu-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }
        
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee;
        }
        
        .card-content {
            padding: 15px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .card-category {
            font-size: 12px;
            color: #25D366;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .card-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        
        .price {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        
        .order-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .order-btn:hover {
            background: #1da15a;
        }
        
        /* ============ FOOTER ============ */
        .cart-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
            padding: 12px 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .cart-footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .cart-footer-left:hover {
            opacity: 0.7;
        }
        
        .cart-total {
            font-weight: 600;
            font-size: 16px;
        }
        
        .cart-item-count {
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .checkout-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        
        .checkout-btn:hover {
            background: #1da15a;
        }
        
        /* ============ MODAL KERANJANG ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px 20px 0 0;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            padding: 20px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-header h2 {
            font-size: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            padding: 0 8px;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 500;
            font-size: 16px;
        }
        
        .cart-item-price {
            font-size: 14px;
            color: #666;
        }
        
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .qty-btn {
            background: #f0f0f0;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qty-btn:hover {
            background: #ddd;
        }
        
        .qty-btn.remove {
            background: #ffebee;
            color: #e53935;
        }
        
        .qty-btn.remove:hover {
            background: #ffcdd2;
        }
        
        .cart-item-qty {
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }
        
        /* ============ FORM DI MODAL ============ */
        .order-options {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #eee;
        }
        
        .order-options label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
            font-size: 14px;
            color: #555;
        }
        
        .order-options select,
        .order-options input[type="number"],
        .order-options textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
            transition: border 0.2s;
        }
        
        .order-options select:focus,
        .order-options input:focus,
        .order-options textarea:focus {
            outline: none;
            border-color: #25D366;
        }
        
        .order-options textarea {
            resize: vertical;
            min-height: 50px;
        }
        
        .radio-group {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            font-size: 14px;
            cursor: pointer;
        }
        
        .radio-group input[type="radio"] {
            accent-color: #25D366;
            width: 16px;
            height: 16px;
        }
        
        .table-input {
            display: none;
        }
        
        .table-input.visible {
            display: block;
        }
        
        .estimation {
            background: #f0fdf4;
            padding: 10px 12px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 14px;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        
        .estimation strong {
            font-weight: 600;
        }
        
        .modal-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            margin-top: 8px;
            border-top: 2px solid #eee;
            font-size: 18px;
            font-weight: 700;
        }
        
        .modal-checkout-btn {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .modal-checkout-btn:hover {
            background: #1da15a;
        }
        
        .empty-cart {
            text-align: center;
            padding: 40px 0;
            color: #999;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        @media (max-width: 640px) {
            body {
                padding: 15px;
                padding-bottom: 100px;
            }
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <h1>🍽️ Aghnia Restaurant</h1>
        <p>Scan QR Code ini untuk pesan langsung via WhatsApp</p>
    </div>
    
    <!-- KATEGORI -->
    <div class="categories" id="categories"></div>
    
    <!-- GRID MENU -->
    <div class="menu-grid" id="menuGrid">
        <div class="loading">Memuat menu...</div>
    </div>
    
    <!-- FOOTER KERANJANG -->
    <div class="cart-footer" id="cartFooter">
        <div class="cart-footer-left" id="viewCartBtn">
            <span>🛒 Keranjang</span>
            <span class="cart-item-count" id="footerItemCount">0</span>
        </div>
        <div>
            <span class="cart-total" id="footerTotal">Rp 0</span>
            <button class="checkout-btn" id="checkoutBtn">Pesan →</button>
        </div>
    </div>
    
    <!-- MODAL KERANJANG -->
    <div class="modal-overlay" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛒 Keranjang Pesanan</h2>
                <button class="modal-close" id="closeModalBtn">✕</button>
            </div>
            
            <!-- Daftar item -->
            <div id="cartItemsContainer"></div>
            
            <!-- Opsi Pemesanan -->
            <div class="order-options">
                <label>Metode Pengiriman</label>
                <div class="radio-group" id="deliveryMethodGroup">
                    <label><input type="radio" name="delivery" value="dine-in" checked> Dine-in</label>
                    <label><input type="radio" name="delivery" value="takeaway"> Takeaway</label>
                    <label><input type="radio" name="delivery" value="delivery"> Delivery</label>
                </div>
                
                <div class="table-input" id="tableInput">
                    <label>Nomor Meja</label>
                    <input type="number" id="tableNumber" placeholder="Masukkan nomor meja (1-20)" min="1" max="20">
                </div>
                
                <label>Catatan Pesanan (opsional)</label>
                <textarea id="orderNotes" placeholder="Contoh: no pedas, pakai es sedikit, tambah sambal..."></textarea>
                
                <div id="estimationDisplay" class="estimation" style="display:none;">
                    ⏱️ Estimasi siap: <strong id="estimationText">15-25 menit</strong>
                </div>
            </div>
            
            <div class="modal-total">
                <span>Total</span>
                <span id="modalTotalPrice">Rp 0</span>
            </div>
            <button class="modal-checkout-btn" id="modalCheckoutBtn">Pesan via WhatsApp →</button>
        </div>
    </div>
    
    <script>
        // ============ KONFIGURASI ============
        const API_URL = 'https://script.google.com/macros/s/AKfycbz67GyELZYeg4JG_IROTKYmsizC9xcP_EzQhdQouzs-jRLp7eoK1709nskiGtGWxzQ1IQ/exec';
        const WHATSAPP_NUMBER = '6285749490884';
        const STORE_NAME = 'Aghnia Restaurant';
        // =====================================
        
        let allItems = [];
        let cart = [];
        let orderNotes = '';
        let deliveryMethod = 'dine-in';
        let tableNumber = '';
        
        // ============ LOCALSTORAGE ============
        function saveToLocalStorage() {
            try {
                const data = {
                    cart: cart,
                    notes: document.getElementById('orderNotes').value,
                    delivery: document.querySelector('input[name="delivery"]:checked')?.value || 'dine-in',
                    table: document.getElementById('tableNumber').value
                };
                localStorage.setItem('resto_cart', JSON.stringify(data));
            } catch (e) {}
        }
        
        function loadFromLocalStorage() {
            try {
                const raw = localStorage.getItem('resto_cart');
                if (!raw) return;
                const data = JSON.parse(raw);
                if (data.cart && Array.isArray(data.cart)) {
                    cart = data.cart;
                }
                if (data.notes !== undefined) {
                    document.getElementById('orderNotes').value = data.notes;
                }
                if (data.delivery) {
                    const radio = document.querySelector(`input[name="delivery"][value="${data.delivery}"]`);
                    if (radio) radio.checked = true;
                    deliveryMethod = data.delivery;
                }
                if (data.table) {
                    document.getElementById('tableNumber').value = data.table;
                    tableNumber = data.table;
                }
                // Trigger perubahan metode
                toggleTableInput(deliveryMethod);
                updateEstimation();
                updateCartUI();
                renderCartModal();
            } catch (e) {}
        }
        
        // ============ ESTIMASI WAKTU ============
        function calculateEstimation() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            let base = 0;
            let extraPerItem = 0;
            
            switch(deliveryMethod) {
                case 'dine-in':
                    base = 15;
                    extraPerItem = 3;
                    break;
                case 'takeaway':
                    base = 10;
                    extraPerItem = 2;
                    break;
                case 'delivery':
                    base = 30;
                    extraPerItem = 5;
                    break;
                default:
                    base = 20;
                    extraPerItem = 3;
            }
            
            const total = base + (totalItems * extraPerItem);
            const min = total - 5;
            const max = total + 5;
            return { min, max, total };
        }
        
        function updateEstimation() {
            const display = document.getElementById('estimationDisplay');
            const text = document.getElementById('estimationText');
            if (cart.length === 0) {
                display.style.display = 'none';
                return;
            }
            const est = calculateEstimation();
            text.textContent = `${est.min}-${est.max} menit`;
            display.style.display = 'block';
        }
        
        // ============ TOGGLE INPUT MEJA ============
        function toggleTableInput(method) {
            const container = document.getElementById('tableInput');
            if (method === 'dine-in') {
                container.classList.add('visible');
            } else {
                container.classList.remove('visible');
            }
        }
        
        // ============ FORMAT RUPIAH ============
        function formatRupiah(angka) {
            return 'Rp ' + Number(angka).toLocaleString('id-ID');
        }
        
        // ============ FETCH MENU ============
        async function fetchMenu() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Gagal mengambil data');
                const data = await response.json();
                allItems = data.filter(item => item.tersedia === 'ya');
                renderCategories();
                renderMenu('semua');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('menuGrid').innerHTML = 
                    '<div class="loading">Gagal memuat menu. Periksa koneksi atau URL API.</div>';
            }
        }
        
        // ============ RENDER KATEGORI ============
        function renderCategories() {
            const categories = ['semua', ...new Set(allItems.map(item => item.kategori))];
            const container = document.getElementById('categories');
            container.innerHTML = categories.map(cat => 
                `<button class="category-btn ${cat === 'semua' ? 'active' : ''}" data-category="${cat}">
                    ${cat === 'semua' ? 'Semua' : cat}
                </button>`
            ).join('');
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMenu(btn.dataset.category);
                });
            });
        }
        
        // ============ RENDER MENU ============
        function renderMenu(category) {
            const filtered = category === 'semua' 
                ? allItems 
                : allItems.filter(item => item.kategori === category);
            
            const container = document.getElementById('menuGrid');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">Tidak ada menu di kategori ini</div>';
                return;
            }
            
            container.innerHTML = filtered.map(item => `
                <div class="menu-card" data-id="${item.id}">
                    <img class="card-img" src="${item.link_gambar}" alt="${item.nama_item}" 
                         onerror="this.src='https://picsum.photos/id/1/400/300'">
                    <div class="card-content">
                        <div class="card-title">${item.nama_item}</div>
                        <div class="card-category">${item.kategori}</div>
                        <div class="card-desc">${item.deskripsi || ''}</div>
                        <div class="price-row">
                            <span class="price">${formatRupiah(parseInt(item.harga))}</span>
                            <button class="order-btn" data-id="${item.id}" data-nama="${item.nama_item}" data-harga="${item.harga}">
                                + Tambah
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.order-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    const nama = btn.dataset.nama;
                    const harga = parseInt(btn.dataset.harga);
                    addToCart(id, nama, harga);
                });
            });
        }
        
        // ============ FUNGSI KERANJANG ============
        function addToCart(id, nama, harga) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ id, nama_item: nama, harga, quantity: 1 });
            }
            updateCartUI();
            saveToLocalStorage();
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '✓ Ditambahkan';
            setTimeout(() => { btn.innerText = originalText; }, 800);
        }
        
        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
            renderCartModal();
            saveToLocalStorage();
            updateEstimation();
        }
        
        function updateQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if (!item) return;
            
            const newQty = item.quantity + delta;
            if (newQty <= 0) {
                removeFromCart(id);
                return;
            }
            item.quantity = newQty;
            updateCartUI();
            renderCartModal();
            saveToLocalStorage();
            updateEstimation();
        }
        
        function getTotalItems() {
            return cart.reduce((sum, item) => sum + item.quantity, 0);
        }
        
        function getTotalPrice() {
            return cart.reduce((sum, item) => sum + (item.harga * item.quantity), 0);
        }
        
        // ============ UPDATE UI KERANJANG ============
        function updateCartUI() {
            const footer = document.getElementById('cartFooter');
            const totalItems = getTotalItems();
            const totalPrice = getTotalPrice();
            
            if (totalItems === 0) {
                footer.style.display = 'none';
            } else {
                footer.style.display = 'flex';
                document.getElementById('footerItemCount').innerText = totalItems;
                document.getElementById('footerTotal').innerHTML = formatRupiah(totalPrice);
            }
            updateEstimation();
        }
        
        // ============ RENDER MODAL KERANJANG ============
        function renderCartModal() {
            const container = document.getElementById('cartItemsContainer');
            const totalPrice = getTotalPrice();
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p style="font-size:48px;">🛒</p>
                        <p>Keranjang masih kosong</p>
                        <p style="font-size:14px;color:#bbb;margin-top:8px;">Tambahkan menu dari daftar</p>
                    </div>
                `;
                document.getElementById('modalTotalPrice').innerHTML = formatRupiah(0);
                return;
            }
            
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.nama_item}</div>
                        <div class="cart-item-price">${formatRupiah(item.harga)}</div>
                    </div>
                    <div class="cart-item-actions">
                        <button class="qty-btn remove" onclick="removeFromCart(${item.id})">✕</button>
                        <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                        <span class="cart-item-qty">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('modalTotalPrice').innerHTML = formatRupiah(totalPrice);
        }
        
        // ============ FORMAT PESANAN WA ============
        function formatWhatsAppMessage() {
            const methodLabels = {
                'dine-in': 'Dine-in',
                'takeaway': 'Takeaway',
                'delivery': 'Delivery'
            };
            
            let message = `*PESANAN DARI ${STORE_NAME.toUpperCase()}*%0A%0A`;
            
            // Metode & Meja
            const method = document.querySelector('input[name="delivery"]:checked')?.value || 'dine-in';
            message += `📋 Metode: ${methodLabels[method] || method}%0A`;
            if (method === 'dine-in') {
                const table = document.getElementById('tableNumber').value || '-';
                message += `🪑 Meja: ${table}%0A`;
            }
            message += `%0A`;
            
            // Item
            cart.forEach(item => {
                message += `🍽️ ${item.nama_item}%0A`;
                message += `   📦 ${item.quantity} x ${formatRupiah(item.harga)} = ${formatRupiah(item.harga * item.quantity)}%0A`;
            });
            
            const total = getTotalPrice();
            message += `%0A*TOTAL: ${formatRupiah(total)}*%0A%0A`;
            
            // Catatan
            const notes = document.getElementById('orderNotes').value.trim();
            if (notes) {
                message += `📝 Catatan: ${notes}%0A%0A`;
            }
            
            // Estimasi
            const est = calculateEstimation();
            message += `⏱️ Estimasi siap: ${est.min}-${est.max} menit%0A%0A`;
            
            message += `Silakan konfirmasi pesanan dan berikan alamat pengiriman.%0A`;
            message += `Terima kasih! 🙏`;
            return message;
        }
        
        function checkout() {
            if (cart.length === 0) {
                alert('Keranjang masih kosong. Silakan pilih menu terlebih dahulu.');
                return;
            }
            
            // Validasi meja jika dine-in
            const method = document.querySelector('input[name="delivery"]:checked')?.value || 'dine-in';
            if (method === 'dine-in') {
                const table = document.getElementById('tableNumber').value;
                if (!table || table < 1 || table > 20) {
                    alert('Silakan isi nomor meja (1-20) untuk pesanan Dine-in.');
                    return;
                }
            }
            
            const message = formatWhatsAppMessage();
            const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
            window.open(waUrl, '_blank');
        }
        
        // ============ EVENT LISTENER ============
        // Buka modal
        document.getElementById('viewCartBtn').addEventListener('click', () => {
            // Baca nilai terbaru dari form
            orderNotes = document.getElementById('orderNotes').value;
            const selectedRadio = document.querySelector('input[name="delivery"]:checked');
            if (selectedRadio) deliveryMethod = selectedRadio.value;
            tableNumber = document.getElementById('tableNumber').value;
            renderCartModal();
            updateEstimation();
            document.getElementById('cartModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        });
        
        // Tutup modal
        function closeModal() {
            document.getElementById('cartModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            saveToLocalStorage();
        }
        
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cartModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('cartModal')) {
                closeModal();
            }
        });
        
        // Perubahan metode pengiriman
        document.querySelectorAll('input[name="delivery"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const method = document.querySelector('input[name="delivery"]:checked')?.value;
                if (method) {
                    deliveryMethod = method;
                    toggleTableInput(method);
                    updateEstimation();
                    saveToLocalStorage();
                }
            });
        });
        
        // Perubahan meja & catatan
        document.getElementById('tableNumber').addEventListener('input', () => {
            saveToLocalStorage();
        });
        document.getElementById('orderNotes').addEventListener('input', () => {
            saveToLocalStorage();
        });
        
        // Checkout dari footer
        document.getElementById('checkoutBtn').addEventListener('click', checkout);
        
        // Checkout dari modal
        document.getElementById('modalCheckoutBtn').addEventListener('click', () => {
            closeModal();
            setTimeout(checkout, 300);
        });
        
        // ============ LOAD ============
        // Load dari localStorage sebelum fetch menu
        loadFromLocalStorage();
        fetchMenu();
    </script>
</body>
</html>
